<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VortexID</title>
</head>
<body>

<h1>VortexID 🔐</h1>

<!-- login -->
<input id="user" placeholder="username">
<input id="pass" placeholder="password">
<button onclick="login()">Login</button>

<hr>

<!-- add -->
<input id="title" placeholder="ชื่อ">
<input id="price" placeholder="ราคา">
<input id="contact" placeholder="ติดต่อ">
<button onclick="add()">เพิ่ม</button>

<ul id="list"></ul>

<script>
const API = 'https://vortexid.onrender.com';
let TOKEN = '';

// login
async function login(){
  const username = user.value;
  const password = pass.value;

  const res = await fetch(API+'/login',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,password})
  });

  const data = await res.json();
  TOKEN = data.token;
  alert('Login สำเร็จ');
}

// load
async function load(){
  const res = await fetch(API+'/accounts');
  const data = await res.json();

  list.innerHTML = data.map(d=>`
    <li>
      ${d.title} - ${d.price}
      <button onclick="del('${d._id}')">ลบ</button>
    </li>
  `).join('');
}

// add
async function add(){
  await fetch(API+'/accounts',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':TOKEN
    },
    body:JSON.stringify({
      title:title.value,
      price:price.value,
      contact:contact.value
    })
  });
  load();
}

// delete
async function del(id){
  await fetch(API+'/accounts/'+id,{
    method:'DELETE',
    headers:{'Authorization':TOKEN}
  });
  load();
}

load();
</script>

</body>
</html>
